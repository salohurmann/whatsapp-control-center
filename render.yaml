services:
  - type: web
    name: wa-prod
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python start_server.py
    plan: starter
    disk:
      name: wa-prod-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: BULK_DB_PATH
        value: /data/whatsapp_bulk.db
